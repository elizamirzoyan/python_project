repos:
  - repo: local
    hooks:
      - id: check-added-large-files
        name: check-added-large-files
        entry: check-added-large-files
        language: system
        pass_filenames: true
        exclude: ^docs/

      - id: check-yaml
        name: check-yaml
        entry: check-yaml
        language: system
        pass_filenames: true
        type: [yaml]

        